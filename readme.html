---
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>QA-AI Academy | Project README</title>
    <style>
      :root {
        color-scheme: light dark;
        --background: #f6f8fa;
        --surface: #ffffff;
        --text: #1f2328;
        --muted: #59636e;
        --border: #d1d9e0;
        --link: #0969da;
        --code: #eff1f3;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #0d1117;
          --surface: #151b23;
          --text: #f0f6fc;
          --muted: #9198a1;
          --border: #3d444d;
          --link: #4493f8;
          --code: #262c36;
        }
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--background);
        color: var(--text);
        font: 16px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 2rem, 900px);
        margin: 2rem auto;
        padding: clamp(1.25rem, 4vw, 3rem);
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface);
      }

      nav { margin-bottom: 2rem; }
      a { color: var(--link); }
      h1, h2 { line-height: 1.25; }
      h1 { padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
      h2 { margin-top: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
      code, pre { background: var(--code); border-radius: 6px; }
      code { padding: 0.15em 0.35em; }
      pre { overflow-x: auto; padding: 1rem; }
      pre code { padding: 0; background: transparent; }
      li + li { margin-top: 0.3rem; }
      strong { font-weight: 650; }
    </style>
  </head>
  <body>
    <main>
      <nav aria-label="Site navigation"><a href="./">&larr; Academy home</a></nav>
      {% capture readme_markdown %}{% include_relative README.md %}{% endcapture %}
      {{ readme_markdown | markdownify }}
    </main>
  </body>
</html>
