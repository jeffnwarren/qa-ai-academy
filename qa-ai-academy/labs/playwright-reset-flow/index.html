<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset Lab</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 42rem; margin: 3rem auto; padding: 0 1rem; line-height: 1.5; }
  label, input, button { display: block; width: 100%; margin-top: 0.5rem; }
  input, button { font: inherit; padding: 0.6rem; }
  button { margin-top: 1rem; cursor: pointer; }
  #result { margin-top: 1rem; padding: 0.75rem; border: 1px solid #bbb; min-height: 2.5rem; }
</style>
</head>
<body>
  <h1>Password Reset Lab</h1>
  <p>Use synthetic addresses only. The confirmation message should not reveal whether an account exists.</p>

  <form id="reset-form">
    <label for="email">Account email</label>
    <input id="email" name="email" type="email" autocomplete="off" required>
    <button type="submit">Send reset link</button>
  </form>

  <div id="result" role="status" aria-live="polite"></div>

<script>
const knownAccounts = new Set(['agent@example.test']);
const form = document.getElementById('reset-form');
const result = document.getElementById('result');

form.addEventListener('submit', event => {
  event.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();

  if (knownAccounts.has(email)) {
    result.textContent = 'If the email is registered, a reset link will be sent.';
  } else {
    result.textContent = 'No account found for ' + email + '.';
  }
});
</script>
</body>
</html>
